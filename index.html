<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MUSEUM">
    
    <title>MUSEUM PREMIUM 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,200;0,900;1,400&family=Lato:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --amber: #f2ba49; /* 高對比琥珀色 */
            --bg: #0a0a0a;
            --serif: 'Playfair Display', serif;
            --sans: 'Lato', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        /* 主容器 */
        .main-container {
            height: 100vh; width: 100vw;
            display: flex;
            overflow-y: hidden; overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .page {
            flex: 0 0 100vw; height: 100vh;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        /* 封面 */
        .page-cover {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #2a2a2a 0%, #050505 100%);
        }
        .cover-title { font-family: var(--serif); font-size: 5rem; color: var(--amber); margin: 0; font-weight: 900; letter-spacing: -3px; }
        
        /* 目錄 */
        .index-page { background: #fff; color: #000; padding: calc(env(safe-area-inset-top) + 20px) 30px; }
        .index-header { font-family: var(--serif); font-size: 3rem; border-bottom: 5px solid #000; margin-bottom: 30px; font-weight: 900; }
        .menu-list { height: 75vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .menu-item {
            padding: 20px; border: 1px solid #eee; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--serif); font-size: 1.2rem;
        }
        .menu-item span { color: var(--amber); margin-right: 15px; font-weight: 900; font-size: 1.5rem; }

        /* 照片容器 */
        .actress-photo-container {
            width: 100%; height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            background: #000;
        }
        .full-img {
            width: 100%; height: 100%;
            object-fit: cover;
            scroll-snap-align: start;
            display: block;
        }

        /* 頂部遮罩 */
        .profile-header-mask {
            position: absolute; top: 0; left: 0; width: 100%;
            height: calc(env(safe-area-inset-top) + 140px);
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
            z-index: 5; pointer-events: none;
        }

        /* 💡 強化後的毛玻璃卡片 */
        .info-card {
            position: absolute; 
            bottom: calc(env(safe-area-inset-bottom) + 140px);
            left: 20px; right: 20px; 
            background: rgba(0, 0, 0, 0.25); /* 稍微加深底色對抗過曝 */
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            backdrop-filter: blur(40px) saturate(200%);
            border-radius: 30px; 
            padding: 26px; 
            border: 1px solid rgba(255,255,255,0.2); 
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* 💡 琥珀色名字：同步加上陰影保護 */
        .card-name { 
            font-family: var(--serif); font-size: 1.8rem; color: var(--amber); 
            margin: 0; letter-spacing: 4px; font-weight: 400; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.4); /* 新增名字陰影 */
        }
        
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; text-align: center; }
        
        /* 數據與標籤：保留黑影保護 */
        .v { 
            font-family: var(--sans); font-weight: 400; color: #fff; 
            display: block; font-size: 1.4rem; letter-spacing: 1px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.6); 
        }
        .label { 
            font-size: 0.65rem; color: rgba(255,255,255,0.85); 
            letter-spacing: 3px; text-transform: uppercase; font-weight: 700;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* 按鈕：BACK TO CONTENTS */
        .btn-back {
            position: absolute; 
            bottom: calc(env(safe-area-inset-bottom) + 60px);
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 40px;
            background: var(--amber); 
            color: #000;
            border-radius: 50px; 
            border: none;
            font-weight: 800; font-size: 0.85rem;
            z-index: 20;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="main-container" id="mainContainer">
    <div class="page page-cover">
        <h1 class="cover-title">MUSEUM</h1>
        <p style="letter-spacing:12px; color:#666; font-size: 0.8rem; margin-top: 15px;">2026 PREMIUM COLLECTION</p>
    </div>

    <div class="page index-page">
        <div class="index-header">CONTENTS</div>
        <div class="menu-list" id="menuList"></div>
    </div>
</div>

<script>
const actressData = [
    { name: "瀨戶環奈", h: 170, cup: "J", bwh: "101-59-91", photoCount: 3 },
    { name: "櫻空桃", h: 160, cup: "G", bwh: "90-55-86", photoCount: 5 },
    { name: "三田真鈴", h: 157, cup: "F", bwh: "77-55-89", photoCount: 4 },
    { name: "涼森玲夢", h: 160, cup: "F", bwh: "87-58-85", photoCount: 4 },
    { name: "石川澪", h: 158, cup: "B", bwh: "78-56-85", photoCount: 4 },
    { name: "鷲尾芽衣", h: 165, cup: "J", bwh: "104-59-89", photoCount: 3 },
    { name: "村上悠華", h: 163, cup: "E", bwh: "85-59-88", photoCount: 4 },
    { name: "五日市芽依", h: 161, cup: "G", bwh: "88-59-89", photoCount: 4 },
    { name: "miru", h: 157, cup: "E", bwh: "82-54-84", photoCount: 4 },
    { name: "七嶋 舞", h: 160, cup: "D", bwh: "84-58-85", photoCount: 4 },
    { name: "長浜蜜璃", h: 161, cup: "G", bwh: "90-58-90", photoCount: 4 },
    { name: "三佳詩", h: 165, cup: "F", bwh: "85-55-87", photoCount: 4 },
    { name: "福田悠亞", h: 162, cup: "H", bwh: "90-55-90", photoCount: 4 },
    { name: "西宮夢", h: 158, cup: "D", bwh: "85-56-86", photoCount: 4 }
];

const container = document.getElementById('mainContainer');
const menuList = document.getElementById('menuList');

actressData.forEach((item, index) => {
    const pageId = index + 2;
    const actressNum = index + 1; 
    
    const menuLink = document.createElement('div');
    menuLink.className = 'menu-item';
    menuLink.innerHTML = `<div><span>${String(actressNum).padStart(2,'0')}</span> ${item.name}</div> <div>→</div>`;
    menuLink.onclick = () => container.scrollTo({ left: window.innerWidth * pageId, behavior: 'smooth' });
    menuList.appendChild(menuLink);

    let photosHTML = "";
    for (let i = 1; i <= item.photoCount; i++) {
        const fileName = `img/${actressNum}-${i}.jpg`;
        photosHTML += `<img src="${fileName}" class="full-img" onerror="this.src='https://via.placeholder.com/800x1200?text=COMING+SOON';">`;
    }

    const page = document.createElement('div');
    page.className = 'page';
    page.innerHTML = `
        <div class="profile-header-mask"></div>
        <div class="actress-photo-container">${photosHTML}</div>
        <div class="info-card">
            <h2 class="card-name">${item.name}</h2>
            <div style="font-size:0.8rem; color:rgba(255,255,255,0.8); margin-top:4px; letter-spacing:1px; font-family:var(--sans); text-shadow: 0 1px 3px rgba(0,0,0,0.5);">${item.h}cm / ${item.cup} Cup</div>
            <div class="data-grid">
                <div class="data-item"><span class="label">Bust</span><span class="v">${item.bwh.split('-')[0]}</span></div>
                <div class="data-item"><span class="label">Waist</span><span class="v">${item.bwh.split('-')[1]}</span></div>
                <div class="data-item"><span class="label">Hips</span><span class="v">${item.bwh.split('-')[2]}</span></div>
            </div>
        </div>
        <button class="btn-back" onclick="goHome()">BACK TO CONTENTS</button>
    `;
    container.appendChild(page);
});

function goHome() {
    container.scrollTo({ left: window.innerWidth, behavior: 'smooth' });
}
</script>
</body>
</html>
