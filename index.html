<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MUSEUM 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Lato:wght@300;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --amber: #d4a017;
            --serif: 'Playfair Display', serif;
            --sans: 'Lato', sans-serif;
            --safe-top: env(safe-area-inset-top, 44px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            background: #fff; color: #1a1a1a;
            overflow: hidden; 
            position: fixed;
        }

        .main-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex; 
            overflow-x: auto; 
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            background: #fff;
        }

        .page { 
            flex: 0 0 100vw; 
            width: 100vw; 
            height: 100%; 
            position: relative; 
            scroll-snap-align: start; 
            overflow: hidden;
            background-color: #fff;
        }

        /* --- 封面頁 --- */
        .cover-page {
            display: flex; align-items: center; justify-content: center;
            height: 100%; background: #fff;
        }
        .cover-img { width: 100vw; height: auto; max-height: 100%; object-fit: contain; display: block; }

        /* --- 目錄頁 --- */
        .index-page { 
            background: #fff; color: #000; 
            padding: calc(var(--safe-top) + 20px) 25px 0 25px;
            display: flex; flex-direction: column; height: 100%;
        }
        .index-header { font-family: var(--serif); font-size: 3.2rem; border-bottom: 6px solid #000; margin-bottom: 20px; font-weight: 900; }
        .menu-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 120px; }
        .menu-item { padding: 20px; border: 1px solid #f0f0f0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-family: var(--serif); font-size: 1.1rem; }

        /* --- 照片頁面 --- */
        .actress-photo-container { 
            width: 100%; height: 100%; 
            overflow-y: auto; scroll-snap-type: y mandatory; 
            background: #fff; 
            scrollbar-width: none;
            position: relative;
            z-index: 2;
            padding-top: var(--safe-top);
        }
        .actress-photo-container::-webkit-scrollbar { display: none; }

        .full-img { 
            width: 100vw; 
            height: calc(100vh - var(--safe-top));
            object-fit: contain; 
            scroll-snap-align: start; 
            display: block;
            background: #fff;
        }

        /* --- 質感介紹卡優化 --- */
        .info-card {
            position: absolute; 
            bottom: calc(var(--safe-bottom) + 30px);
            left: 20px; right: 20px; 
            /* 極致毛玻璃：背景更透但模糊更強 */
            background: rgba(255, 255, 255, 0.4); 
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            backdrop-filter: blur(40px) saturate(200%);
            border-radius: 30px; 
            padding: 24px 28px; 
            /* 微弱白邊框增加邊緣質感 */
            border: 1px solid rgba(255, 255, 255, 0.5); 
            z-index: 10;
            /* 柔和長陰影 */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 12px;
            margin-bottom: 18px;
        }

        .card-name { 
            font-family: var(--serif); 
            font-size: 2.2rem; 
            color: #000; 
            margin: 0; 
            font-weight: 900;
            letter-spacing: -0.5px;
            /* 文字微影增加厚度感 */
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.8), 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .card-sub { 
            font-family: var(--sans);
            font-size: 0.9rem; 
            color: #333; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .data-grid { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .data-item {
            flex: 1;
            text-align: center;
            position: relative;
        }

        /* 數據間的垂直分割線 */
        .data-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: rgba(0, 0, 0, 0.1);
        }

        .v { 
            font-family: var(--sans); 
            font-weight: 900; 
            color: #000; 
            font-size: 1.6rem; 
            display: block;
            margin-bottom: 2px;
        }
        
        .label { 
            font-size: 0.65rem; 
            color: #777; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: 900; 
        }

        /* --- 返回按鈕：極簡風格 --- */
        .btn-float-back {
            position: absolute; 
            bottom: calc(var(--safe-bottom) - 10px); 
            right: 25px; 
            width: 50px; height: 50px; 
            background: rgba(255, 255, 255, 0.6); 
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 30; 
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); 
            font-size: 1.5rem;
            transition: transform 0.2s;
        }
        
        .btn-float-back:active { transform: scale(0.9); }

    </style>
</head>
<body>

<div class="main-container" id="mainContainer">
    <div class="page cover-page">
        <img src="./img/cover.jpg" class="cover-img" alt="Cover">
    </div>

    <div class="page index-page">
        <div class="index-header">CONTENTS</div>
        <div id="menuList" class="menu-list"></div>
    </div>
</div>

<script>
const actressData = [
    { name: "瀨戶環奈", h: 170, cup: "J", bwh: "101-59-91", photoCount: 3 },
    { name: "櫻空桃", h: 160, cup: "G", bwh: "90-55-86", photoCount: 5 },
    { name: "三田真鈴", h: 157, cup: "F", bwh: "77-55-89", photoCount: 4 },
    { name: "涼森玲夢", h: 160, cup: "F", bwh: "87-58-85", photoCount: 4 },
    { name: "石川澪", h: 158, cup: "B", bwh: "78-56-85", photoCount: 4 },
    { name: "鷲尾芽衣", h: 165, cup: "J", bwh: "104-59-89", photoCount: 3 },
    { name: "村上悠華", h: 163, cup: "E", bwh: "85-59-88", photoCount: 4 },
    { name: "五日市芽依", h: 161, cup: "G", bwh: "88-59-89", photoCount: 4 },
    { name: "miru", h: 157, cup: "E", bwh: "82-54-84", photoCount: 4 },
    { name: "七嶋 舞", h: 160, cup: "D", bwh: "84-58-85", photoCount: 4 },
    { name: "長浜蜜璃", h: 161, cup: "G", bwh: "90-58-90", photoCount: 4 },
    { name: "三佳詩", h: 165, cup: "F", bwh: "85-55-87", photoCount: 4 },
    { name: "福田悠亞", h: 162, cup: "H", bwh: "90-55-90", photoCount: 4 },
    { name: "西宮夢", h: 158, cup: "D", bwh: "85-56-86", photoCount: 4 },
    { name: "彩月七緒", h: 164, cup: "H", bwh: "92-59-84", photoCount: 4 },
    { name: "凪ひかる", h: 162, cup: "K", bwh: "105-58-88", photoCount: 4 },
    { name: "小宵こなん", h: 164, cup: "H", bwh: "96-59-94", photoCount: 4 },
    { name: "白上咲花", h: 168, cup: "C", bwh: "83-57-89", photoCount: 4 },
    { name: "百田光稀", h: 166, cup: "J", bwh: "100-57-89", photoCount: 4 },
    { name: "九野ひなの", h: 157, cup: "G", bwh: "90-60-88", photoCount: 4 },
    { name: "河合あすな", h: 158, cup: "H", bwh: "88-59-89", photoCount: 4 },
    { name: "桃乃木かな", h: 153, cup: "F", bwh: "89-58-83", photoCount: 4 }
];

const container = document.getElementById('mainContainer');
const menuList = document.getElementById('menuList');

actressData.forEach((item, index) => {
    const actressNum = index + 1; 
    const menuLink = document.createElement('div');
    menuLink.className = 'menu-item';
    menuLink.innerHTML = `<div><span style="color:var(--amber); font-weight:900; margin-right:12px;">${String(actressNum).padStart(2,'0')}</span> ${item.name}</div> <span>→</span>`;
    menuLink.onclick = () => container.scrollTo({ left: window.innerWidth * (index + 2), behavior: 'smooth' });
    menuList.appendChild(menuLink);

    let photosHTML = "";
    for (let i = 1; i <= item.photoCount; i++) {
        photosHTML += `<img src="./img/${actressNum}-${i}.jpg" class="full-img">`;
    }

    const page = document.createElement('div');
    page.className = 'page';
    page.innerHTML = `
        <div class="actress-photo-container">${photosHTML}</div>
        <button class="btn-float-back" onclick="container.scrollTo({left:window.innerWidth, behavior:'smooth'})">🔙</button>
        <div class="info-card">
            <div class="card-header">
                <h2 class="card-name">${item.name}</h2>
                <div class="card-sub">${item.h}cm / ${item.cup}</div>
            </div>
            <div class="data-grid">
                <div class="data-item"><span class="v">${item.bwh.split('-')[0]}</span><span class="label">Bust</span></div>
                <div class="data-item"><span class="v">${item.bwh.split('-')[1]}</span><span class="label">Waist</span></div>
                <div class="data-item"><span class="v">${item.bwh.split('-')[2]}</span><span class="label">Hips</span></div>
            </div>
        </div>
    `;
    container.appendChild(page);
});
</script>
</body>
</html>
