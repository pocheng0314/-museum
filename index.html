<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MUSEUM">
    
    <title>MUSEUM PREMIUM 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,200;0,900;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --bg: #0a0a0a;
            --serif: 'Playfair Display', serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* 主容器：橫向切換女優 */
        .main-container {
            height: 100vh; width: 100vw;
            display: flex;
            overflow-y: hidden; overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .page {
            flex: 0 0 100vw; height: 100vh;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        /* 封面設計 */
        .page-cover {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
        }
        .cover-title { font-family: var(--serif); font-size: 4.5rem; color: var(--gold); margin: 0; font-weight: 900; letter-spacing: -2px; }
        
        /* 目錄設計 */
        .index-page { background: #fff; color: #000; padding: calc(env(safe-area-inset-top) + 20px) 30px; }
        .index-header { font-family: var(--serif); font-size: 2.8rem; border-bottom: 3px solid #000; margin-bottom: 25px; font-weight: 900; }
        .menu-list { height: 75vh; overflow-y: auto; display: flex; flex-direction: column; }
        .menu-item {
            padding: 18px 0; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; font-size: 1.1rem; align-items: center;
        }
        .menu-item span { font-family: var(--serif); color: var(--gold); margin-right: 12px; font-weight: 900; font-size: 1.3rem; }

        /* 照片容器：縱向滑動 */
        .actress-photo-container {
            width: 100%; height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            background: #000;
        }
        .full-img {
            width: 100%; height: 100%;
            object-fit: cover;
            scroll-snap-align: start;
            display: block;
        }

        /* 頂部文字：時尚細體化 */
        .profile-header-mask {
            position: absolute; top: 0; left: 0; width: 100%;
            height: calc(env(safe-area-inset-top) + 100px);
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
            z-index: 5; pointer-events: none;
        }
        .profile-title { 
            position: absolute; top: calc(env(safe-area-inset-top) + 15px); 
            width: 100%; text-align: center; font-family: var(--serif); 
            font-size: 3.2rem; font-weight: 200; /* 這裡改細了 */
            color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.5); 
            z-index: 10; pointer-events: none; letter-spacing: 4px;
        }

        /* 透明毛玻璃卡片核心 */
        .info-card {
            position: absolute; 
            bottom: calc(env(safe-area-inset-bottom) + 130px);
            left: 20px; right: 20px; 
            background: rgba(255, 255, 255, 0.05); /* 極低透明度白色 */
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            backdrop-filter: blur(35px) saturate(180%);
            border-radius: 28px; 
            padding: 24px; 
            border: 1px solid rgba(255,255,255,0.15); /* 微亮邊框 */
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .card-name { font-family: var(--serif); font-size: 1.8rem; color: var(--gold); margin: 0; letter-spacing: 3px; font-weight: 400; }
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 18px; }
        .v { font-weight: 800; color: #fff; display: block; font-size: 1.2rem; }
        .label { font-size: 0.6rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }

        /* 透明毛玻璃膠囊按鈕 */
        .btn-back {
            position: absolute; 
            bottom: calc(env(safe-area-inset-bottom) + 55px);
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 35px;
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 600; font-size: 0.75rem;
            z-index: 20;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="main-container" id="mainContainer">
    <div class="page page-cover">
        <h1 class="cover-title">MUSEUM</h1>
        <p style="letter-spacing:10px; color:#555; font-size: 0.8rem; margin-top: 10px;">2026 PREMIUM COLLECTION</p>
    </div>

    <div class="page index-page">
        <div class="index-header">CONTENTS</div>
        <div class="menu-list" id="menuList"></div>
    </div>
</div>

<script>
// --- 女優資料庫：修改 photoCount 即可自動增減照片 ---
const actressData = [
    { name: "瀨戶環奈", h: 170, cup: "J", bwh: "101-59-91", photoCount: 3 },
    { name: "櫻空桃", h: 160, cup: "G", bwh: "90-55-86", photoCount: 5 },
    { name: "三田真鈴", h: 157, cup: "F", bwh: "77-55-89", photoCount: 4 },
    { name: "涼森玲夢", h: 160, cup: "F", bwh: "87-58-85", photoCount: 4 },
    { name: "石川澪", h: 158, cup: "B", bwh: "78-56-85", photoCount: 4 },
    { name: "鷲尾芽衣", h: 165, cup: "J", bwh: "104-59-89", photoCount: 3 },
    { name: "村上悠華", h: 163, cup: "E", bwh: "85-59-88", photoCount: 4 },
    { name: "五日市芽依", h: 161, cup: "G", bwh: "88-59-89", photoCount: 4 },
    { name: "miru", h: 157, cup: "E", bwh: "82-54-84", photoCount: 4 },
    { name: "七嶋 舞", h: 160, cup: "D", bwh: "84-58-85", photoCount: 4 },
    { name: "長浜蜜璃", h: 161, cup: "G", bwh: "90-58-90", photoCount: 4 },
    { name: "三佳詩", h: 165, cup: "F", bwh: "85-55-87", photoCount: 4 },
    { name: "福田悠亞", h: 162, cup: "H", bwh: "90-55-90", photoCount: 4 },
    { name: "西宮夢", h: 158, cup: "D", bwh: "85-56-86", photoCount: 4 }
];

const container = document.getElementById('mainContainer');
const menuList = document.getElementById('menuList');

actressData.forEach((item, index) => {
    const pageId = index + 2;
    const actressNum = index + 1; 
    
    // 生成目錄項目
    const menuLink = document.createElement('div');
    menuLink.className = 'menu-item';
    menuLink.innerHTML = `<div><span>${String(actressNum).padStart(2,'0')}</span> ${item.name}</div> <div>→</div>`;
    menuLink.onclick = () => container.scrollTo({ left: window.innerWidth * pageId, behavior: 'smooth' });
    menuList.appendChild(menuLink);

    // 生成照片 HTML (自動拼出 img/1-1.jpg 等)
    let photosHTML = "";
    for (let i = 1; i <= item.photoCount; i++) {
        const fileName = `img/${actressNum}-${i}.jpg`;
        photosHTML += `<img src="${fileName}" class="full-img" onerror="this.src='https://via.placeholder.com/800x1200?text=PHOTO+COMING+SOON';">`;
    }

    // 生成個人分頁
    const page = document.createElement('div');
    page.className = 'page';
    page.innerHTML = `
        <div class="profile-header-mask"></div>
        <h1 class="profile-title">${item.name}</h1>
        <div class="actress-photo-container">${photosHTML}</div>
        <div class="info-card">
            <h2 class="card-name">${item.name}</h2>
            <div style="font-size:0.8rem; color:rgba(255,255,255,0.6); margin-top:4px;">${item.h}cm / ${item.cup} Cup</div>
            <div class="data-grid">
                <div class="data-item"><span class="label">Bust</span><span class="v">${item.bwh.split('-')[0]}</span></div>
                <div class="data-item"><span class="label">Waist</span><span class="v">${item.bwh.split('-')[1]}</span></div>
                <div class="data-item"><span class="label">Hips</span><span class="v">${item.bwh.split('-')[2]}</span></div>
            </div>
        </div>
        <button class="btn-back" onclick="goHome()">Back to Index</button>
    `;
    container.appendChild(page);
});

function goHome() {
    container.scrollTo({ left: window.innerWidth, behavior: 'smooth' });
}
</script>
</body>
</html>
