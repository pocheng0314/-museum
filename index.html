<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MUSEUM PREMIUM 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --bg: #0a0a0a;
            --serif: 'Playfair Display', serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); color: #fff; font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        .main-container {
            height: 100vh; width: 100vw;
            display: flex;
            overflow-y: hidden; overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .page {
            flex: 0 0 100vw; height: 100vh;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        .page-cover {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #222 0%, #000 100%);
        }
        .cover-title { font-family: var(--serif); font-size: 4rem; color: var(--gold); margin: 0; font-weight: 900; }
        
        .index-page { background: #fff; color: #000; padding: calc(env(safe-area-inset-top) + 20px) 30px; }
        .index-header { font-family: var(--serif); font-size: 2.5rem; border-bottom: 2px solid #000; margin-bottom: 20px; }
        .menu-list { height: 75vh; overflow-y: auto; display: flex; flex-direction: column; }
        .menu-item {
            padding: 15px 0; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; font-size: 1.1rem;
        }
        .menu-item span { font-family: var(--serif); color: var(--gold); margin-right: 10px; }

        .actress-photo-container {
            width: 100%; height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            background: #000;
        }
        .full-img {
            width: 100%; height: 100%;
            object-fit: cover;
            scroll-snap-align: start;
            display: block;
        }

        .profile-title { 
            position: absolute; top: env(safe-area-inset-top); width: 100%; 
            text-align: center; font-family: var(--serif); font-size: 3rem; 
            color: #fff; text-shadow: 0 0 15px rgba(0,0,0,0.8); z-index: 10; pointer-events: none;
        }
        .info-card {
            position: absolute; bottom: calc(env(safe-area-inset-bottom) + 115px);
            left: 20px; right: 20px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px); border-radius: 20px; padding: 18px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 10;
        }
        .card-name { font-family: var(--serif); font-size: 1.6rem; color: var(--gold); margin: 0; }
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .v { font-weight: 800; color: #fff; display: block; }
        .label { font-size: 0.6rem; color: #aaa; letter-spacing: 1px; }

        .btn-back {
            position: absolute; 
            bottom: calc(env(safe-area-inset-bottom) + 40px);
            left: 40px; right: 40px; 
            padding: 12px;
            background: var(--gold); color: #000;
            border-radius: 50px; border: none; 
            font-weight: 800; font-size: 0.9rem;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="main-container" id="mainContainer">
    <div class="page page-cover">
        <h1 class="cover-title">MUSEUM</h1>
        <p style="letter-spacing:8px; color:#666;">2026 PREMIUM</p>
    </div>

    <div class="page index-page">
        <div class="index-header">CONTENTS</div>
        <div class="menu-list" id="menuList"></div>
    </div>
</div>

<script>
// --- 女優資料庫：你只需要填入 photoCount (照片張數) ---
const actressData = [
    { name: "瀨戶環奈", h: 170, cup: "J", bwh: "101-59-91", photoCount: 3 },
    { name: "櫻空桃", h: 160, cup: "G", bwh: "90-55-86", photoCount: 5 },
    { name: "三田真鈴", h: 157, cup: "F", bwh: "77-55-89", photoCount: 4 },
    { name: "涼森玲夢", h: 160, cup: "F", bwh: "87-58-85", photoCount: 4 },
    { name: "石川澪", h: 158, cup: "B", bwh: "78-56-85", photoCount: 4 },
    { name: "鷲尾芽衣", h: 165, cup: "J", bwh: "104-59-89", photoCount: 3 },
    { name: "村上悠華", h: 163, cup: "E", bwh: "85-59-88", photoCount: 4 },
    { name: "五日市芽依", h: 161, cup: "G", bwh: "88-59-89", photoCount: 4 },
    { name: "miru", h: 157, cup: "E", bwh: "82-54-84", photoCount: 4 },
    { name: "七嶋 舞", h: 160, cup: "D", bwh: "84-58-85", photoCount: 4 },
    { name: "長浜蜜璃", h: 161, cup: "G", bwh: "90-58-90", photoCount: 4 },
    { name: "三佳詩", h: 165, cup: "F", bwh: "85-55-87", photoCount: 4 },
    { name: "福田悠亞", h: 162, cup: "H", bwh: "90-55-90", photoCount: 4 },
    { name: "西宮夢", h: 158, cup: "D", bwh: "85-56-86", photoCount: 4 }
];

const container = document.getElementById('mainContainer');
const menuList = document.getElementById('menuList');

actressData.forEach((item, index) => {
    const pageId = index + 2;
    const actressNum = index + 1; // 這是女優編號 (1, 2, 3...)
    
    // 1. 生成目錄
    const menuLink = document.createElement('div');
    menuLink.className = 'menu-item';
    menuLink.innerHTML = `<div><span>${String(actressNum).padStart(2,'0')}</span> ${item.name}</div> <div>→</div>`;
    menuLink.onclick = () => container.scrollTo({ left: window.innerWidth * pageId, behavior: 'smooth' });
    menuList.appendChild(menuLink);

    // 2. 自動生成照片路徑
    let photosHTML = "";
    for (let i = 1; i <= item.photoCount; i++) {
        // 這裡會自動產生 img/1-1.jpg, img/1-2.jpg 等路徑
        const fileName = `img/${actressNum}-${i}.jpg`;
        photosHTML += `<img src="${fileName}" class="full-img" onerror="this.src='https://via.placeholder.com/800x1200?text=MISSING+PHOTO';">`;
    }

    // 3. 生成個人頁
    const page = document.createElement('div');
    page.className = 'page';
    page.innerHTML = `
        <h1 class="profile-title">${item.name}</h1>
        <div class="actress-photo-container">${photosHTML}</div>
        <div class="info-card">
            <h2 class="card-name">${item.name}</h2>
            <div style="font-size:0.8rem; color:#888;">${item.h}cm / ${item.cup} Cup</div>
            <div class="data-grid">
                <div class="data-item"><span class="label">BUST</span><span class="v">${item.bwh.split('-')[0]}</span></div>
                <div class="data-item"><span class="label">WAIST</span><span class="v">${item.bwh.split('-')[1]}</span></div>
                <div class="data-item"><span class="label">HIPS</span><span class="v">${item.bwh.split('-')[2]}</span></div>
            </div>
        </div>
        <button class="btn-back" onclick="goHome()">BACK TO CONTENTS</button>
    `;
    container.appendChild(page);
});

function goHome() {
    container.scrollTo({ left: window.innerWidth, behavior: 'smooth' });
}
</script>
</body>
</html>
